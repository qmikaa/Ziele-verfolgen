<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WingWae Goals</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --border2: #333;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #c8ff00;
    --accent-dim: rgba(200,255,0,0.08);
    --accent-dim2: rgba(200,255,0,0.15);
    --red: #ff4545;
    --green: #c8ff00;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .tagline {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .hero {
    padding: 24px 24px 0;
  }

  .hero h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text);
  }

  .hero h1 span {
    color: var(--accent);
  }

  .overview-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    padding: 20px 24px 0;
  }

  .ov-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-align: center;
  }

  .ov-card:hover, .ov-card.active {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .ov-card .ov-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .ov-card.active .ov-label {
    color: var(--accent);
  }

  .ov-card .ov-count {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .ov-card .ov-done {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
  }

  .tabs-bar {
    display: flex;
    gap: 6px;
    padding: 20px 24px 0;
    flex-wrap: wrap;
  }

  .tab-btn {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    letter-spacing: 0.02em;
  }

  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  .content {
    padding: 16px 24px 100px;
  }

  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
  }

  .progress-info {
    font-size: 11px;
    color: var(--text3);
  }

  .progress-track {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  .goal-list { display: flex; flex-direction: column; gap: 6px; }

  .goal-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s;
    position: relative;
  }

  .goal-item:hover { border-color: var(--border2); }

  .goal-item.done {
    opacity: 0.4;
  }

  .goal-item.done .goal-text {
    text-decoration: line-through;
    color: var(--text3);
  }

  .goal-item.levelup-flash {
    border-color: var(--accent);
    background: var(--accent-dim);
    animation: flash 0.6s ease;
  }

  @keyframes flash {
    0% { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim2); }
    100% { border-color: var(--border); box-shadow: none; }
  }

  .check-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }

  .check-btn:hover { border-color: var(--accent); }

  .check-btn.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .check-btn.checked::after {
    content: '';
    display: block;
    width: 5px;
    height: 9px;
    border: 2px solid #000;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .goal-text {
    font-size: 14px;
    color: var(--text);
    flex: 1;
    line-height: 1.4;
  }

  .goal-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    border: 1px solid var(--border2);
    color: var(--text2);
    background: var(--surface2);
  }

  .goal-badge.has-next {
    border-color: rgba(200,255,0,0.3);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .del-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }

  .goal-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { color: var(--red); }

  .add-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .add-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-row input:focus { border-color: var(--accent); }
  .add-row input::placeholder { color: var(--text3); }

  .add-row button {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 18px;
    font-weight: 700;
    color: #000;
    cursor: pointer;
    transition: opacity 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .add-row button:hover { opacity: 0.85; }

  .empty-state {
    font-size: 13px;
    color: var(--text3);
    padding: 20px 0;
    text-align: center;
  }

  .levelup-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .levelup-modal.show { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 28px 24px;
    max-width: 340px;
    width: 100%;
    text-align: center;
  }

  .modal-emoji { font-size: 40px; margin-bottom: 12px; }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .modal-text {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.5;
    margin-bottom: 20px;
  }

  .modal-next {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    background: var(--accent-dim);
    border: 1px solid rgba(200,255,0,0.3);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 20px;
  }

  .modal-btns { display: flex; gap: 8px; }

  .modal-btn {
    flex: 1;
    padding: 11px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    transition: all 0.15s;
  }

  .modal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .modal-btn:hover { opacity: 0.85; }

  .streak-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 14px;
  }

  .streak-fire { font-size: 18px; }

  .streak-text {
    font-size: 13px;
    color: var(--text2);
  }

  .streak-count {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    margin-left: auto;
  }

  @media (max-width: 500px) {
    .overview-grid { grid-template-columns: repeat(3, 1fr); }
    header { padding: 20px 16px 0; }
    .hero { padding: 16px 16px 0; }
    .hero h1 { font-size: 22px; }
    .tabs-bar { padding: 16px 16px 0; }
    .content { padding: 14px 16px 80px; }
    .overview-grid { padding: 16px 16px 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">WingWae Goals</div>
  <div class="tagline">Level Up System</div>
</header>

<div class="hero">
  <h1>Deine Ziele.<br><span>Kein Bullshit.</span></h1>
</div>

<div class="overview-grid" id="overview-grid"></div>

<div class="tabs-bar">
  <button class="tab-btn active" onclick="switchTab('daily')">Täglich</button>
  <button class="tab-btn" onclick="switchTab('weekly')">Wöchentlich</button>
  <button class="tab-btn" onclick="switchTab('monthly')">Monatlich</button>
  <button class="tab-btn" onclick="switchTab('yearly')">Jährlich</button>
  <button class="tab-btn" onclick="switchTab('life')">Lebensziele</button>
</div>

<div class="content">
  <div id="tab-daily" class="section active"></div>
  <div id="tab-weekly" class="section"></div>
  <div id="tab-monthly" class="section"></div>
  <div id="tab-yearly" class="section"></div>
  <div id="tab-life" class="section"></div>
</div>

<div class="levelup-modal" id="levelup-modal">
  <div class="modal-box">
    <div class="modal-emoji">⚡</div>
    <div class="modal-title">Level Up!</div>
    <div class="modal-text" id="modal-text"></div>
    <div class="modal-next" id="modal-next"></div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="dismissLevelup(false)">Nur abhaken</button>
      <button class="modal-btn primary" onclick="dismissLevelup(true)">Level Up ↗</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'mika_goals_v4';

const DEFAULT = {
  daily: [
    { id:1, text:'Kein Morgen-Scrollen — Handy erst nach Sport', done:false, level:null, nextText:null, nextLevel:null },
    { id:2, text:'1 WingWae TikTok produzieren & posten', done:false, level:null, nextText:null, nextLevel:null },
    { id:3, text:'3 Personal TikToks drehen & posten', done:false, level:null, nextText:null, nextLevel:null },
    { id:4, text:'Training absolvieren (Gym / Boxing / Sport)', done:false, level:null, nextText:null, nextLevel:null },
    { id:5, text:'190g+ Protein treffen', done:false, level:null, nextText:null, nextLevel:null },
    { id:6, text:'Um 8:00 Uhr aufstehen (freie Tage)', done:false, level:null, nextText:null, nextLevel:null },
    { id:7, text:'Kein Social Media vor 12:00 Uhr außer für Content', done:false, level:null, nextText:null, nextLevel:null },
    { id:8, text:'Täglich 1 Business-Aufgabe zuerst erledigen bevor Entertainment', done:false, level:null, nextText:null, nextLevel:null },
  ],
  weekly: [
    { id:1, text:'Mindestens 5 neue Bestellungen über WingWae', done:false, level:null, nextText:null, nextLevel:null },
    { id:2, text:'10 neue WhatsApp Kanal Follower gewinnen', done:false, level:'Woche 1', nextText:'20 neue WhatsApp Kanal Follower gewinnen', nextLevel:'Woche 2' },
    { id:3, text:'Bestes & schlechtestes TikTok analysieren — 1 Learning notieren', done:false, level:null, nextText:null, nextLevel:null },
    { id:4, text:'Mindestens 1 neues Warenbatch scouten oder bestellen', done:false, level:null, nextText:null, nextLevel:null },
    { id:5, text:'Kein einziger Tag ohne Sport diese Woche', done:false, level:null, nextText:null, nextLevel:null },
    { id:6, text:'Jeden Abend 30 min kein Handy vor dem Schlafen', done:false, level:null, nextText:null, nextLevel:null },
  ],
  monthly: [
    { id:1, text:'1.000€ Umsatz mit WingWae', done:false, level:'Level 1', nextText:'2.000€ Umsatz mit WingWae', nextLevel:'Level 2' },
    { id:2, text:'WhatsApp Kanal: 150 Follower', done:false, level:'Level 1', nextText:'WhatsApp Kanal: 300 Follower', nextLevel:'Level 2' },
    { id:3, text:'WingWae TikTok: 500 Follower', done:false, level:'Level 1', nextText:'WingWae TikTok: 1.000 Follower', nextLevel:'Level 2' },
    { id:4, text:'Personal TikTok: 1.000 neue Follower', done:false, level:'Level 1', nextText:'Personal TikTok: 2.000 neue Follower', nextLevel:'Level 2' },
    { id:5, text:'0 Tage diese Woche komplett ohne Morgenroutine', done:false, level:null, nextText:null, nextLevel:null },
    { id:6, text:'Mindestens 1 neue Einnahmequelle oder Kooperation getestet', done:false, level:null, nextText:null, nextLevel:null },
  ],
  yearly: [
    { id:1, text:'10.000€ Jahresumsatz WingWae (2026)', done:false, level:'2026', nextText:'50.000€ Jahresumsatz WingWae (2027)', nextLevel:'2027' },
    { id:2, text:'Personal TikTok: 10k Follower (Ende 2026)', done:false, level:'2026', nextText:'Personal TikTok: 50k Follower (2027)', nextLevel:'2027' },
    { id:3, text:'Fachabi an BBS Syke erfolgreich abschließen', done:false, level:null, nextText:null, nextLevel:null },
    { id:4, text:'70kg lean erreichen (bis Ende 2027)', done:false, level:null, nextText:null, nextLevel:null },
    { id:5, text:'Erstes 10k Monat mit WingWae (2027)', done:false, level:null, nextText:null, nextLevel:null },
  ],
  life: [
    { id:1, text:'Dodge Challenger Hellcat in Weiß kaufen', done:false, level:null, nextText:null, nextLevel:null },
    { id:2, text:'Karriere in der Kripo / gehobener Dienst', done:false, level:null, nextText:null, nextLevel:null },
    { id:3, text:'WingWae zu einer echten Brand aufbauen', done:false, level:null, nextText:null, nextLevel:null },
    { id:4, text:'Finanziell unabhängig sein bevor Ausbildung endet', done:false, level:null, nextText:null, nextLevel:null },
  ]
};

const TAB_LABELS = { daily:'Täglich', weekly:'Wöchentlich', monthly:'Monatlich', yearly:'Jährlich', life:'Lebensziele' };
const TABS = ['daily','weekly','monthly','yearly','life'];

let state = loadState();
let currentTab = 'daily';
let pendingLevelup = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT));
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((t,i) => t.classList.toggle('active', TABS[i] === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  render(tab);
}

function renderOverview() {
  const grid = document.getElementById('overview-grid');
  grid.innerHTML = TABS.map(tab => {
    const goals = state[tab] || [];
    const done = goals.filter(g => g.done).length;
    const total = goals.length;
    return `<div class="ov-card ${tab === currentTab ? 'active' : ''}" onclick="switchTab('${tab}')">
      <div class="ov-label">${TAB_LABELS[tab]}</div>
      <div class="ov-count">${done}/${total}</div>
    </div>`;
  }).join('');
}

function render(tab) {
  renderOverview();
  const container = document.getElementById('tab-' + tab);
  const goals = state[tab] || [];
  const done = goals.filter(g => g.done).length;
  const total = goals.length;
  let html = '';

  if (tab === 'daily') {
    const streak = state._streak || 0;
    html += `<div class="streak-bar"><span class="streak-fire">🔥</span><span class="streak-text">Tages-Streak</span><span class="streak-count">${streak} Tage</span></div>`;
  }

  if (total > 0) {
    html += `<div class="section-header"><span class="section-title">${TAB_LABELS[tab]}</span><span class="progress-info">${done} / ${total}</span></div>`;
    html += `<div class="progress-track"><div class="progress-fill" style="width:${Math.round(done/total*100)}%"></div></div>`;
  }

  html += '<div class="goal-list">';
  if (!goals.length) html += '<p class="empty-state">Noch keine Ziele. Füge dein erstes hinzu.</p>';
  goals.forEach(g => {
    const hasnext = g.nextText ? 'has-next' : '';
    html += `<div class="goal-item ${g.done ? 'done' : ''}" id="gi-${tab}-${g.id}">
      <button class="check-btn ${g.done ? 'checked' : ''}" onclick="toggleGoal('${tab}',${g.id})" aria-label="Abhaken"></button>
      <span class="goal-text">${g.text}</span>
      ${g.level ? `<span class="goal-badge ${hasnext}">${g.level}</span>` : ''}
      <button class="del-btn" onclick="deleteGoal('${tab}',${g.id})" aria-label="Löschen">×</button>
    </div>`;
  });
  html += '</div>';

  html += `<div class="add-row">
    <input type="text" id="new-goal-${tab}" placeholder="Ziel hinzufügen..." onkeydown="if(event.key==='Enter')addGoal('${tab}')" />
    <button onclick="addGoal('${tab}')">+</button>
  </div>`;

  container.innerHTML = html;
}

function toggleGoal(tab, id) {
  const goal = state[tab].find(g => g.id === id);
  if (!goal) return;
  goal.done = !goal.done;

  if (goal.done && goal.nextText) {
    pendingLevelup = { tab, id };
    document.getElementById('modal-text').textContent = `"${goal.text}" — erledigt!`;
    document.getElementById('modal-next').textContent = '→ ' + goal.nextText;
    document.getElementById('levelup-modal').classList.add('show');
    saveState();
    render(tab);
    return;
  }

  if (tab === 'daily') checkDailyStreak();
  saveState();
  render(tab);
}

function dismissLevelup(doLevelup) {
  document.getElementById('levelup-modal').classList.remove('show');
  if (!pendingLevelup) return;
  const { tab, id } = pendingLevelup;
  const goal = state[tab].find(g => g.id === id);
  if (goal && doLevelup) {
    goal.text = goal.nextText;
    goal.level = goal.nextLevel;
    goal.nextText = null;
    goal.nextLevel = null;
    goal.done = false;
  }
  pendingLevelup = null;
  saveState();
  render(tab);
}

function checkDailyStreak() {}

function addGoal(tab) {
  const input = document.getElementById('new-goal-' + tab);
  const text = input.value.trim();
  if (!text) return;
  const ids = state[tab].map(g => g.id);
  const newId = ids.length ? Math.max(...ids) + 1 : 1;
  state[tab].push({ id:newId, text, done:false, level:null, nextText:null, nextLevel:null });
  input.value = '';
  saveState();
  render(tab);
}

function deleteGoal(tab, id) {
  state[tab] = state[tab].filter(g => g.id !== id);
  saveState();
  render(tab);
}

if (!state._streak) state._streak = 0;

function checkDailyReset() {
  const today = new Date().toDateString();
  const lastReset = state._lastReset;
  if (lastReset !== today) {
    if (lastReset) {
      const allDone = state.daily.length > 0 && state.daily.every(g => g.done);
      if (allDone) {
        state._streak = (state._streak || 0) + 1;
      } else if (state._lastReset) {
        state._streak = 0;
      }
    }
    state.daily.forEach(g => g.done = false);
    state._lastReset = today;
    saveState();
  }
}

checkDailyReset();
render('daily');
renderOverview();
</script>
</body>
</html>
